<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 180">
  <defs>
    <linearGradient id="mg" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#F2DC98"/>
      <stop offset="35%" stop-color="#C8860A"/>
      <stop offset="100%" stop-color="#6B4503"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <mask id="eyeMaskL">
      <rect width="180" height="180" fill="white"/>
      <ellipse cx="67.3" cy="81" rx="17.9" ry="10.5" fill="black" transform="rotate(-13 67.3 81)"/>
      <ellipse cx="112.7" cy="81" rx="17.9" ry="10.5" fill="black" transform="rotate(13 112.7 81)"/>
    </mask>
  </defs>

  <!-- Logo background (transparent by default — add rect for opaque version) -->
  <!-- <rect width="680" height="180" fill="#0E1A22"/> -->

  <!-- ── ICON MARK (left, 180×180 canvas scaled 35%) ── -->
  <g transform="translate(0,0) scale(0.352)">
    <!-- Mask body -->
    <path
      mask="url(#eyeMaskL)"
      fill="url(#mg)"
      d="M 86 262
         C 86 190, 138 158, 198 160
         C 226 161, 247 179, 254 198
         C 255 202, 255.5 206, 256 207
         C 256.5 206, 257 202, 258 198
         C 265 179, 286 161, 314 160
         C 374 158, 426 190, 426 262
         C 426 306, 401 330, 370 324
         C 341 318, 315 296, 295 275
         C 281 261, 271 253, 256 253
         C 241 253, 231 261, 217 275
         C 197 296, 171 318, 142 324
         C 111 330, 86 306, 86 262
         Z"/>
    <!-- Highlight -->
    <ellipse
      mask="url(#eyeMaskL)"
      cx="256" cy="188" rx="152" ry="40"
      fill="url(#shine)" opacity="0.9"/>
    <!-- Ornament -->
    <path d="M 256 358 L 264 372 L 256 386 L 248 372 Z" fill="#C8860A" opacity="0.55"/>
    <circle cx="256" cy="344" r="3" fill="#C8860A" opacity="0.4"/>
  </g>

  <!-- ── WORDMARK ── -->
  <!-- "Dicobluff" — Cormorant Garamond italic bold -->
  <text
    x="196" y="122"
    font-family="'Cormorant Garamond', 'Cormorant', Georgia, serif"
    font-style="italic"
    font-weight="700"
    font-size="86"
    letter-spacing="-1"
    fill="#F5EDD8">Dicobluff</text>

  <!-- Tagline — Manrope uppercase -->
  <text
    x="198" y="150"
    font-family="'Manrope', system-ui, sans-serif"
    font-weight="700"
    font-size="11.5"
    letter-spacing="3.5"
    fill="#A0937A">LE JEU DE BLUFF LITTÉRAIRE</text>
</svg>
