<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0E1A22">
  <title>Dicobluff — Hors ligne</title>
  <style>
    :root { --bg:#0E1A22; --cream:#F5EDD8; --gold:#C8860A; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      background:var(--bg); color:var(--cream);
      font-family:'Manrope',system-ui,sans-serif;
      min-height:100dvh; display:grid; place-items:center;
      text-align:center; padding:24px;
    }
    .wrap { max-width:340px; }
    svg { width:52px; height:52px; color:var(--gold); margin-bottom:24px; }
    h1 { font-family:'Cormorant Garamond',Georgia,serif; font-size:2.2rem; font-weight:300; font-style:italic; margin-bottom:12px; }
    p { font-size:.9rem; line-height:1.7; opacity:.68; margin-bottom:28px; }
    a {
      display:inline-block; padding:12px 28px;
      background:var(--gold); color:#0E1A22;
      font-weight:700; font-size:.85rem; letter-spacing:.06em; text-transform:uppercase;
      text-decoration:none; border-radius:8px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M1 6l11 11L23 6"/><path d="M1 1h22v14H1z"/>
    </svg>
    <h1>Hors connexion</h1>
    <p>Tu es hors ligne. Lance une partie solo depuis le jeu — il fonctionne sans internet.</p>
    <a href="game.html">Jouer hors ligne</a>
  </div>
</body>
</html>
