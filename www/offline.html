<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dicobluff — Hors ligne</title>
<link rel="icon" type="image/svg+xml" href="./assets/icon.svg">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,400;1,600&family=Manrope:wght@500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1A2A36;
    color: #F5EDD8;
    font-family: 'Manrope', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    text-align: center;
    gap: 0;
  }
  .ornament {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: #C8860A;
    font-size: 1.1rem;
    opacity: .6;
    margin-bottom: 28px;
    letter-spacing: .1em;
  }
  .icon {
    font-size: 3.2rem;
    margin-bottom: 20px;
    filter: drop-shadow(0 4px 16px rgba(200,134,10,.3));
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 600;
    font-size: 2rem;
    color: #F5EDD8;
    margin-bottom: 12px;
    line-height: 1.2;
  }
  p {
    font-size: .9rem;
    color: #A0937A;
    line-height: 1.6;
    max-width: 280px;
    margin-bottom: 32px;
  }
  button {
    background: linear-gradient(135deg, #C8860A, #E5C170);
    color: #0E1A22;
    border: none;
    border-radius: 100px;
    padding: 14px 28px;
    font-family: 'Manrope', sans-serif;
    font-weight: 700;
    font-size: .9rem;
    cursor: pointer;
    letter-spacing: .02em;
    transition: filter .2s;
  }
  button:hover { filter: brightness(1.08); }
  .logo {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 600;
    font-size: 1.3rem;
    color: #C8860A;
    letter-spacing: -.01em;
    opacity: .7;
  }
</style>
</head>
<body>
  <div class="logo">Dicobluff</div>
  <div class="ornament">— ✦ —</div>
  <div class="icon">📡</div>
  <h1>Tu es hors ligne</h1>
  <p>Vérifie ta connexion et réessaie. Les parties solo sont disponibles sans réseau.</p>
  <button onclick="location.reload()">Réessayer</button>
</body>
</html>
